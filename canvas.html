<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g50:#f0faf3;--g100:#d6f3df;--g200:#aee6c3;--g500:#2da05a;--g600:#1e7d44;
  --s50:#fafaf8;--s100:#f3f2ee;--s200:#e5e3dc;--s400:#a09d93;--s600:#6b6860;--s800:#2c2b27;--s900:#181714;
  --surface:#fff;--border:#e5e3dc;
  --fb:'DM Sans',system-ui,sans-serif;--fd:'DM Serif Display',Georgia,serif;
}
html,body{height:100%;overflow:hidden;font-family:var(--fb)}
.app{display:flex;flex-direction:column;height:100vh;background:var(--s50)}

/* HEADER */
header{height:48px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;z-index:10}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logomark{width:28px;height:28px;background:var(--g500);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logotext{font-family:var(--fd);font-size:18px;color:var(--s900)}.logotext span{color:var(--g500)}
.hbtn{font-family:var(--fb);font-size:12px;font-weight:500;border:1px solid var(--border);background:none;color:var(--s600);border-radius:7px;padding:6px 12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
.hbtn:hover{background:var(--s100);color:var(--s900)}
.hbtn.green{background:var(--g500);color:#fff;border-color:transparent}.hbtn.green:hover{background:var(--g600)}
.header-actions{display:flex;align-items:center;gap:6px}

/* TOOLBAR */
.toolbar{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:2px;flex-shrink:0;overflow-x:auto}
.tgroup{display:flex;align-items:center;gap:2px;padding:0 8px;border-right:1px solid var(--border)}
.tgroup:last-child{border-right:none;margin-left:auto}
.tbtn{width:34px;height:34px;border:none;background:none;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--s600);transition:all .15s;flex-shrink:0;position:relative}
.tbtn:hover{background:var(--s100);color:var(--s900)}
.tbtn.active{background:var(--g50);color:var(--g600)}
.tbtn svg{width:18px;height:18px;pointer-events:none}
.tbtn[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--s900);color:#fff;font-size:11px;padding:3px 8px;border-radius:5px;white-space:nowrap;pointer-events:none;z-index:200}

/* COLOR SWATCHES */
.cswatch{width:26px;height:26px;border-radius:6px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;transition:transform .12s}
.cswatch:hover{transform:scale(1.1)}

/* SIZE CONTROLS */
.size-group{display:flex;align-items:center;gap:5px;padding:0 4px}
.size-group label{font-size:11px;color:var(--s400);white-space:nowrap}
.size-group input[type=range]{width:70px;accent-color:var(--g500)}
.size-group span{font-size:11px;font-weight:500;min-width:28px;color:var(--s800)}
.spreset{font-family:var(--fb);font-size:10px;font-weight:600;width:22px;height:22px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--s600);cursor:pointer;transition:all .12s}
.spreset:hover{background:var(--s100)}
.spreset.active{background:var(--g50);color:var(--g700);border-color:var(--g200)}

/* FONT CONTROLS */
.fsel{font-family:var(--fb);font-size:12px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;background:var(--surface);color:var(--s800);max-width:130px}
.fsize{width:46px;font-family:var(--fb);font-size:12px;border:1px solid var(--border);border-radius:6px;padding:4px 6px;text-align:center}

/* CANVAS AREA */
.canvas-area{flex:1;position:relative;overflow:hidden}
#cv{position:absolute;top:0;left:0;touch-action:none;cursor:crosshair}
#cv.cur-text{cursor:text}
#cv.cur-grab{cursor:grab}
#cv.cur-grabbing{cursor:grabbing}
#cv.cur-eraser{cursor:cell}

/* CURSOR RING */
#cur-ring{position:absolute;border-radius:50%;pointer-events:none;z-index:50;transform:translate(-50%,-50%);display:none}

/* TEXT INPUT OVERLAY */
#txt-overlay{position:absolute;display:none;z-index:20;pointer-events:none}
#txt-box{
  border:none;
  outline:none;
  resize:none;
  padding:0;
  margin:0;
  background:transparent;
  pointer-events:all;
  white-space:pre;
  overflow:hidden;
  min-width:4px;
  line-height:1.3;
}
/* blinking cursor indicator */
#txt-cursor{position:absolute;width:2px;background:currentColor;pointer-events:none;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* PANEL */
.panel{position:absolute;right:0;top:0;bottom:0;width:210px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;z-index:5;transition:transform .2s}
.panel.hidden{transform:translateX(100%)}
.psec{padding:12px;border-bottom:1px solid var(--s100)}
.plabel{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:1px;color:var(--s400);margin-bottom:8px}
.color-dots{display:flex;flex-wrap:wrap;gap:5px}
.cdot{width:20px;height:20px;border-radius:4px;border:1px solid rgba(0,0,0,.08);cursor:pointer;transition:transform .12s}
.cdot:hover{transform:scale(1.15)}
.pal-swatches{display:flex;flex-wrap:wrap;gap:6px}
.psw{display:flex;flex-direction:column;align-items:center;gap:3px}
.psw-color{width:30px;height:30px;border-radius:6px;border:1px solid rgba(0,0,0,.08);cursor:pointer}
.psw-hex{font-size:9px;color:var(--s400);font-family:monospace}
.pfont{background:var(--s50);border-radius:6px;padding:7px 10px;margin-bottom:5px}
.pfont-name{font-size:13px;font-weight:500;color:var(--s800)}
.btn{font-family:var(--fb);font-size:12px;font-weight:500;border:none;border-radius:7px;padding:7px 12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.btn-g{background:var(--g500);color:#fff}.btn-g:hover{background:var(--g600)}
.btn-o{background:none;color:var(--s600);border:1px solid var(--border)}.btn-o:hover{background:var(--s100)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:16px;padding:24px;max-width:520px;width:calc(100vw - 32px);box-shadow:0 8px 40px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal h3{font-family:var(--fd);font-size:22px;font-weight:400;margin-bottom:16px}
.msec{margin-bottom:20px}
.msec h4{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.8px;color:var(--s400);margin-bottom:10px}
.mpal{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.msw{display:flex;flex-direction:column;align-items:center;gap:4px}
.msw-c{width:42px;height:42px;border-radius:8px;border:1px solid rgba(0,0,0,.08);cursor:pointer;transition:transform .12s}
.msw-c:hover{transform:scale(1.08)}
.msw-h{font-size:10px;color:var(--s400);font-family:monospace}
.code-block{background:var(--s900);border-radius:8px;padding:12px;position:relative;margin-top:6px}
.code-block pre{font-family:monospace;font-size:11px;color:#a8e6c0;line-height:1.6;overflow-x:auto;white-space:pre}
.copy-btn{position:absolute;top:8px;right:8px;font-family:var(--fb);font-size:11px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15);border-radius:5px;padding:3px 9px;cursor:pointer}
.copy-btn:hover{background:rgba(255,255,255,.2)}
.copy-btn.ok{background:var(--g600);color:#fff;border-color:transparent}
.mfont-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mfont-card{background:var(--s50);border:1px solid var(--border);border-radius:8px;padding:10px}
.mfont-card .mfn{font-size:12px;font-weight:500}
.mfont-card .mfp{font-size:18px;margin:3px 0}
</style>

<script>
const cv   = document.getElementById('cv');
const ctx  = cv.getContext('2d');
const area = document.getElementById('area');

let tool='pen', sColor='#181714', fColor='#aee6c3', fillOn=false;
let lw=3, alpha=1, ff='DM Sans', fs=20;
let zoom=1, panX=0, panY=0, panning=false, panStart={x:0,y:0};
let drawing=false, sx=0, sy=0;
let paths=[], undos=[], redos=[];
let colorHist=[], fontsUsed=new Set();
let snap=null, curPath=null;
let textActive=false, textPos=null;

// ── RESIZE ──────────────────────────────────────────────
function resize(){const r=area.getBoundingClientRect();cv.width=r.width;cv.height=r.height;redraw();}
window.addEventListener('resize',resize); resize();

// ── COORDS ──────────────────────────────────────────────
function toWorld(cx,cy){const r=cv.getBoundingClientRect();return{x:(cx-r.left-panX)/zoom,y:(cy-r.top-panY)/zoom};}
function getPos(e){return e.touches?toWorld(e.touches[0].clientX,e.touches[0].clientY):toWorld(e.clientX,e.clientY);}

// ── REDRAW ──────────────────────────────────────────────
function redraw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
  paths.forEach(drawObj);
  // draw live text preview
  if(textActive && textPos){
    const box=document.getElementById('txt-box');
    const txt=box.value;
    if(txt){
      ctx.save();
      ctx.globalAlpha=alpha;
      ctx.fillStyle=sColor;
      ctx.font=`${fs}px "${ff}",sans-serif`;
      txt.split('\n').forEach((line,i)=>ctx.fillText(line,textPos.x,textPos.y+(i+1)*fs*1.3));
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawObj(o){
  ctx.save();
  ctx.globalAlpha=o.a??1;ctx.strokeStyle=o.s;ctx.lineWidth=o.lw;ctx.lineCap='round';ctx.lineJoin='round';
  if(o.f)ctx.fillStyle=o.f;
  switch(o.type){
    case 'pen':if(!o.pts||o.pts.length<2)break;ctx.beginPath();ctx.moveTo(o.pts[0].x,o.pts[0].y);o.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();break;
    case 'eraser':if(!o.pts||o.pts.length<2)break;ctx.save();ctx.globalCompositeOperation='destination-out';ctx.globalAlpha=1;ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=o.lw;ctx.beginPath();ctx.moveTo(o.pts[0].x,o.pts[0].y);o.pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.stroke();ctx.restore();break;
    case 'line':ctx.beginPath();ctx.moveTo(o.x1,o.y1);ctx.lineTo(o.x2,o.y2);ctx.stroke();break;
    case 'arrow':drawArrow(ctx,o.x1,o.y1,o.x2,o.y2,o.lw);break;
    case 'rect':ctx.beginPath();ctx.rect(o.x,o.y,o.w,o.h);if(o.f)ctx.fill();ctx.stroke();break;
    case 'circle':ctx.beginPath();ctx.ellipse(o.cx,o.cy,Math.abs(o.rx),Math.abs(o.ry),0,0,Math.PI*2);if(o.f)ctx.fill();ctx.stroke();break;
    case 'text':ctx.font=`${o.fs}px "${o.ff}",sans-serif`;ctx.fillStyle=o.s;ctx.globalAlpha=o.a??1;o.text.split('\n').forEach((l,i)=>ctx.fillText(l,o.x,o.y+i*o.fs*1.3));break;
  }
  ctx.restore();
}

function drawArrow(c,x1,y1,x2,y2,w){
  const hl=Math.max(10,w*4),ang=Math.atan2(y2-y1,x2-x1);
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();
  c.beginPath();c.moveTo(x2,y2);
  c.lineTo(x2-hl*Math.cos(ang-0.4),y2-hl*Math.sin(ang-0.4));
  c.lineTo(x2-hl*Math.cos(ang+0.4),y2-hl*Math.sin(ang+0.4));
  c.closePath();c.fillStyle=c.strokeStyle;c.fill();
}

// ── MOUSE EVENTS ────────────────────────────────────────
cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);
cv.addEventListener('mouseup',onUp);
cv.addEventListener('mouseleave',onUp);
cv.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();onUp(e)},{passive:false});

function onDown(e){
  const pos=getPos(e);
  if(tool==='pan'||e.button===1||(e.button===0&&e.altKey)){panning=true;panStart={x:e.clientX-panX,y:e.clientY-panY};cv.className='cur-grabbing';return;}
  if(tool==='text') return;
  drawing=true;sx=pos.x;sy=pos.y;saveUndo();
  if(tool==='pen'||tool==='eraser'){curPath={type:tool,s:sColor,lw,a:alpha,pts:[{x:pos.x,y:pos.y}]};paths.push(curPath);if(tool==='pen')addColor(sColor);}
  else snap=ctx.getImageData(0,0,cv.width,cv.height);
}

function onMove(e){
  updateCursorRing(e);
  if(panning){panX=e.clientX-panStart.x;panY=e.clientY-panStart.y;redraw();return;}
  if(!drawing)return;
  const p=getPos(e);
  if(tool==='pen'||tool==='eraser'){curPath.pts.push({x:p.x,y:p.y});redraw();}
  else{
    ctx.putImageData(snap,0,0);
    ctx.save();ctx.translate(panX,panY);ctx.scale(zoom,zoom);
    ctx.globalAlpha=alpha;ctx.strokeStyle=sColor;ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
    if(fillOn)ctx.fillStyle=fColor;
    if(tool==='line'){ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(p.x,p.y);ctx.stroke();}
    else if(tool==='arrow')drawArrow(ctx,sx,sy,p.x,p.y,lw);
    else if(tool==='rect'){ctx.beginPath();ctx.rect(sx,sy,p.x-sx,p.y-sy);if(fillOn)ctx.fill();ctx.stroke();}
    else if(tool==='circle'){const rx=(p.x-sx)/2,ry=(p.y-sy)/2;ctx.beginPath();ctx.ellipse(sx+rx,sy+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);if(fillOn)ctx.fill();ctx.stroke();}
    ctx.restore();
  }
}

function onUp(e){
  if(panning){panning=false;setCursor();return;}
  if(!drawing)return;drawing=false;
  const pos=e.touches?toWorld(e.changedTouches[0].clientX,e.changedTouches[0].clientY):getPos(e);
  if(tool!=='pen'&&tool!=='eraser'){
    const base={s:sColor,lw,a:alpha},f=fillOn?fColor:null;
    let obj=null;
    if(tool==='line')  obj={...base,type:'line',x1:sx,y1:sy,x2:pos.x,y2:pos.y};
    else if(tool==='arrow') obj={...base,type:'arrow',x1:sx,y1:sy,x2:pos.x,y2:pos.y};
    else if(tool==='rect')  obj={...base,type:'rect',f,x:sx,y:sy,w:pos.x-sx,h:pos.y-sy};
    else if(tool==='circle'){const rx=(pos.x-sx)/2,ry=(pos.y-sy)/2;obj={...base,type:'circle',f,cx:sx+rx,cy:sy+ry,rx,ry};}
    if(obj){paths.push(obj);if(obj.s)addColor(obj.s);if(obj.f)addColor(obj.f);}
    snap=null;redraw();
  }
  curPath=null;updatePanel();
}

// ── TEXT TOOL ────────────────────────────────────────────
cv.addEventListener('click',e=>{
  if(tool!=='text')return;
  if(textActive){commitText();return;}
  const pos=toWorld(e.clientX,e.clientY);
  const ov=document.getElementById('txt-overlay');
  const box=document.getElementById('txt-box');
  const r=cv.getBoundingClientRect();
  textPos=pos;
  textActive=true;

  // position overlay at click point
  const sx2=pos.x*zoom+panX, sy2=pos.y*zoom+panY;
  ov.style.cssText=`display:block;left:${sx2}px;top:${sy2}px;`;
  box.style.cssText=`
    font-size:${fs*zoom}px;
    font-family:"${ff}",sans-serif;
    color:${sColor};
    caret-color:${sColor};
    background:rgba(255,255,255,0.15);
    border:1.5px dashed ${sColor};
    border-radius:3px;
    padding:2px 4px;
    min-width:60px;
    min-height:${fs*zoom+8}px;
    outline:none;
    resize:none;
    display:block;
    line-height:1.3;
    white-space:pre;
    overflow:hidden;
  `;
  box.value='';
  box.focus();

  // live preview as user types
  box.oninput=()=>redraw();

  box.onkeydown=ev=>{
    if(ev.key==='Escape'){cancelText();return;}
    if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();commitText();}
  };
  box.onblur=()=>setTimeout(()=>{if(textActive)commitText();},120);
});

function commitText(){
  const box=document.getElementById('txt-box');
  const txt=box.value.trim();
  if(txt&&textPos){
    saveUndo();
    paths.push({type:'text',text:txt,x:textPos.x,y:textPos.y,s:sColor,ff,fs,a:alpha});
    fontsUsed.add(ff);addColor(sColor);
  }
  cancelText();
  updatePanel();
}

function cancelText(){
  textActive=false;textPos=null;
  const ov=document.getElementById('txt-overlay');
  ov.style.display='none';
  document.getElementById('txt-box').value='';
  redraw();
}

// ── TOOL SWITCHING ───────────────────────────────────────
const TOOLS={pen:'t-pen',eraser:'t-eraser',line:'t-line',arrow:'t-arrow',rect:'t-rect',circle:'t-circle',text:'t-text',pan:'t-pan'};

function setTool(t){
  if(textActive)commitText();
  tool=t;
  Object.entries(TOOLS).forEach(([k,id])=>document.getElementById(id).classList.toggle('active',k===t));
  document.getElementById('font-ctrl').style.display=t==='text'?'flex':'none';
  setCursor();
}
function setCursor(){cv.className={pan:'cur-grab',text:'cur-text',eraser:'cur-eraser'}[tool]||'';}
Object.entries(TOOLS).forEach(([t,id])=>document.getElementById(id).addEventListener('click',()=>setTool(t)));

document.addEventListener('keydown',e=>{
  if(e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT')return;
  const map={p:'pen',e:'eraser',l:'line',a:'arrow',r:'rect',c:'circle',t:'text'};
  if(map[e.key.toLowerCase()])setTool(map[e.key.toLowerCase()]);
  if(e.key===' '){e.preventDefault();setTool('pan');}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if((e.ctrlKey||e.metaKey)&&e.key==='y'){e.preventDefault();redo();}
});
document.addEventListener('keyup',e=>{if(e.key===' '&&tool==='pan')setTool('pen');});

// ── COLORS ───────────────────────────────────────────────
document.getElementById('sw-stroke').onclick=()=>document.getElementById('in-stroke').click();
document.getElementById('in-stroke').oninput=e=>{sColor=e.target.value;document.getElementById('sw-stroke').style.background=sColor;if(textActive)redraw();};
document.getElementById('sw-fill').onclick=()=>document.getElementById('in-fill').click();
document.getElementById('in-fill').oninput=e=>{fColor=e.target.value;document.getElementById('sw-fill').style.background=fColor;};
document.getElementById('t-fill').onclick=()=>{fillOn=!fillOn;document.getElementById('t-fill').classList.toggle('active',fillOn);document.getElementById('sw-fill').style.opacity=fillOn?'1':'0.4';};

function addColor(h){if(!h||h==='transparent')return;const c=h.toLowerCase();colorHist=colorHist.filter(x=>x!==c);colorHist.unshift(c);if(colorHist.length>24)colorHist.pop();updateColorDots();}
function updateColorDots(){const el=document.getElementById('p-colors');el.innerHTML='';colorHist.slice(0,16).forEach(hex=>{const d=document.createElement('div');d.className='cdot';d.style.background=hex;d.title=hex;d.onclick=()=>{sColor=hex;document.getElementById('in-stroke').value=hex;document.getElementById('sw-stroke').style.background=hex;};el.appendChild(d);});}

// ── SIZE & OPACITY ───────────────────────────────────────
const curRing=document.getElementById('cur-ring');
function updateSizeUI(){document.getElementById('sz-val').textContent=lw+'px';document.getElementById('sz-slider').value=lw;document.querySelectorAll('.spreset').forEach(b=>b.classList.toggle('active',+b.dataset.s===lw));}
document.getElementById('sz-slider').oninput=e=>{lw=+e.target.value;updateSizeUI();};
document.querySelectorAll('.spreset').forEach(b=>b.addEventListener('click',()=>{lw=+b.dataset.s;updateSizeUI();}));
document.getElementById('op-slider').oninput=e=>{alpha=+e.target.value/100;document.getElementById('op-val').textContent=e.target.value+'%';};

function updateCursorRing(e){
  if(tool==='text'||tool==='pan'){curRing.style.display='none';return;}
  const r=area.getBoundingClientRect();
  curRing.style.display='block';
  curRing.style.left=(e.clientX-r.left)+'px';
  curRing.style.top=(e.clientY-r.top)+'px';
  const sz=Math.max(4,lw*zoom);
  curRing.style.width=sz+'px';curRing.style.height=sz+'px';
  if(tool==='eraser'){curRing.style.background='rgba(180,180,180,.3)';curRing.style.border='1.5px solid #888';}
  else{curRing.style.background=sColor+'55';curRing.style.border='1.5px solid '+sColor+'99';}
}
area.addEventListener('mousemove',updateCursorRing);
area.addEventListener('mouseleave',()=>curRing.style.display='none');

// ── FONT CONTROLS ────────────────────────────────────────
document.getElementById('ff-sel').onchange=e=>{ff=e.target.value;if(textActive)redraw();};
document.getElementById('fs-inp').oninput=e=>{
  fs=+e.target.value||20;
  if(textActive){
    const box=document.getElementById('txt-box');
    box.style.fontSize=(fs*zoom)+'px';
    box.style.minHeight=(fs*zoom+8)+'px';
    redraw();
  }
};

// ── ZOOM ─────────────────────────────────────────────────
function setZoom(z){zoom=Math.max(.1,Math.min(10,z));document.getElementById('zoom-lbl').textContent=Math.round(zoom*100)+'%';redraw();}
document.getElementById('btn-zi').onclick=()=>setZoom(zoom*1.2);
document.getElementById('btn-zo').onclick=()=>setZoom(zoom/1.2);
document.getElementById('btn-zr').onclick=()=>{setZoom(1);panX=0;panY=0;redraw();};
cv.addEventListener('wheel',e=>{e.preventDefault();setZoom(zoom*(e.deltaY>0?.9:1.1));},{passive:false});

// ── UNDO / REDO ──────────────────────────────────────────
function saveUndo(){undos.push(JSON.stringify(paths));if(undos.length>60)undos.shift();redos=[];}
function undo(){if(!undos.length)return;redos.push(JSON.stringify(paths));paths=JSON.parse(undos.pop());redraw();updatePanel();}
function redo(){if(!redos.length)return;undos.push(JSON.stringify(paths));paths=JSON.parse(redos.pop());redraw();updatePanel();}
document.getElementById('btn-undo').onclick=undo;
document.getElementById('btn-redo').onclick=redo;
document.getElementById('btn-clear').onclick=()=>{if(!paths.length)return;saveUndo();paths=[];cancelText();redraw();updatePanel();};

// ── PANEL ────────────────────────────────────────────────
document.getElementById('btn-panel').onclick=()=>document.getElementById('panel').classList.toggle('hidden');

function extractColors(){const s=new Set();paths.forEach(o=>{if(o.s&&o.s!=='transparent')s.add(o.s.toLowerCase());if(o.f&&o.f!=='transparent')s.add(o.f.toLowerCase());});return[...s];}
function extractFonts(){const s=new Set();paths.forEach(o=>{if(o.type==='text'&&o.ff)s.add(o.ff);});return[...s];}

function updatePanel(){
  const colors=extractColors(),fonts=extractFonts();
  const pp=document.getElementById('p-palette');pp.innerHTML='';
  colors.forEach(hex=>{const w=document.createElement('div');w.className='psw';const c=document.createElement('div');c.className='psw-color';c.style.background=hex;c.onclick=()=>navigator.clipboard.writeText(hex);const l=document.createElement('div');l.className='psw-hex';l.textContent=hex;w.appendChild(c);w.appendChild(l);pp.appendChild(w);});
  const pf=document.getElementById('p-fonts');pf.innerHTML='';
  fonts.forEach(f=>{const d=document.createElement('div');d.className='pfont';d.innerHTML=`<div class="pfont-name" style="font-family:'${f}',sans-serif">${f}</div>`;pf.appendChild(d);});
}

// ── EXPORT ───────────────────────────────────────────────
function exportPNG(){
  const exp=document.createElement('canvas');exp.width=cv.width;exp.height=cv.height;
  const ec=exp.getContext('2d');ec.fillStyle='#fff';ec.fillRect(0,0,exp.width,exp.height);
  ec.save();ec.translate(panX,panY);ec.scale(zoom,zoom);
  paths.forEach(o=>{
    ec.save();ec.globalAlpha=o.a??1;ec.strokeStyle=o.s;ec.lineWidth=o.lw;ec.lineCap='round';ec.lineJoin='round';
    if(o.f)ec.fillStyle=o.f;
    switch(o.type){
      case 'pen':if(!o.pts||o.pts.length<2)break;ec.beginPath();ec.moveTo(o.pts[0].x,o.pts[0].y);o.pts.forEach(p=>ec.lineTo(p.x,p.y));ec.stroke();break;
      case 'eraser':if(!o.pts||o.pts.length<2)break;ec.save();ec.globalCompositeOperation='destination-out';ec.globalAlpha=1;ec.strokeStyle='rgba(0,0,0,1)';ec.lineWidth=o.lw;ec.beginPath();ec.moveTo(o.pts[0].x,o.pts[0].y);o.pts.forEach(p=>ec.lineTo(p.x,p.y));ec.stroke();ec.restore();break;
      case 'line':ec.beginPath();ec.moveTo(o.x1,o.y1);ec.lineTo(o.x2,o.y2);ec.stroke();break;
      case 'arrow':drawArrow(ec,o.x1,o.y1,o.x2,o.y2,o.lw);break;
      case 'rect':ec.beginPath();ec.rect(o.x,o.y,o.w,o.h);if(o.f)ec.fill();ec.stroke();break;
      case 'circle':ec.beginPath();ec.ellipse(o.cx,o.cy,Math.abs(o.rx),Math.abs(o.ry),0,0,Math.PI*2);if(o.f)ec.fill();ec.stroke();break;
      case 'text':ec.font=`${o.fs}px "${o.ff}",sans-serif`;ec.fillStyle=o.s;ec.globalAlpha=o.a??1;o.text.split('\n').forEach((l,i)=>ec.fillText(l,o.x,o.y+i*o.fs*1.3));break;
    }
    ec.restore();
  });
  ec.restore();
  const a=document.createElement('a');a.download='palettly-canvas.png';a.href=exp.toDataURL('image/png');a.click();
}

function openModal(){
  const colors=extractColors(),fonts=extractFonts();
  const mp=document.getElementById('m-pal');mp.innerHTML='';
  colors.forEach(hex=>{const w=document.createElement('div');w.className='msw';const c=document.createElement('div');c.className='msw-c';c.style.background=hex;c.onclick=()=>navigator.clipboard.writeText(hex);const l=document.createElement('div');l.className='msw-h';l.textContent=hex;w.appendChild(c);w.appendChild(l);mp.appendChild(w);});
  document.getElementById('m-css').textContent=colors.length?':root {\n'+colors.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n')+'\n}':'/* No colors yet */';
  const mf=document.getElementById('m-fonts');mf.innerHTML='';
  fonts.forEach(f=>{const d=document.createElement('div');d.className='mfont-card';d.innerHTML=`<div class="mfn">${f}</div><div class="mfp" style="font-family:'${f}',sans-serif">Aa Bb Cc</div>`;mf.appendChild(d);});
  document.getElementById('m-imports').textContent=fonts.length?`@import url('https://fonts.googleapis.com/css2?${fonts.map(f=>`family=${encodeURIComponent(f)}`).join('&')}&display=swap');\n\n${fonts.map(f=>`/* font-family: '${f}', sans-serif; */`).join('\n')}`:'/* No fonts yet */';
  document.getElementById('exp-modal').classList.add('open');
}

document.getElementById('btn-export').onclick=openModal;
document.getElementById('p-kit').onclick=openModal;
document.getElementById('p-png').onclick=exportPNG;
document.getElementById('m-dl-png').onclick=exportPNG;
document.getElementById('m-close').onclick=()=>document.getElementById('exp-modal').classList.remove('open');
document.getElementById('exp-modal').onclick=e=>{if(e.target===document.getElementById('exp-modal'))document.getElementById('exp-modal').classList.remove('open');};
['m-css-cp','m-imp-cp'].forEach((id,i)=>{document.getElementById(id).onclick=function(){navigator.clipboard.writeText(document.getElementById(['m-css','m-imports'][i]).textContent);this.textContent='Copied!';this.classList.add('ok');setTimeout(()=>{this.textContent='Copy';this.classList.remove('ok');},1800);};});

// ── INIT ─────────────────────────────────────────────────
addColor('#181714');updateSizeUI();setTool('pen');updatePanel();
</script>
